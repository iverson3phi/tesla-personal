<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Juniper</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="card">
    <header class="brand">
      <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5.362l2.475-3.026s4.245.09 8.471 2.054c-1.082 1.636-3.231 2.438-3.231 2.438-.146-1.439-1.154-1.79-1.154-1.79L12 24 5.439 5.038s-1.008.351-1.154 1.79c0 0-2.149-.802-3.231-2.438C5.28 2.426 9.525 2.336 9.525 2.336L12 5.362z"/>
        <path d="M12 .79c3.415-.027 7.325.529 11.328 2.273.535-.96.672-1.384.672-1.384C19.625.69 15.27.029 12 0 8.73.029 4.375.69.001 1.679c0 0 .195.494.671 1.384C4.676 1.318 8.585.763 12 .79z"/>
      </svg>
      <h1>Juniper</h1>
      <p class="tagline">Model Y</p>
    </header>

    <section class="row">
      <span class="label">건조 시간</span>
      <span id="minutesLabel" class="value">1분</span>
    </section>
    <input id="minutes" type="range" min="1" max="3" step="1" value="1" class="slider">

    <section class="row toggle">
      <span class="label">창문 살짝 열기</span>
      <label class="switch">
        <input id="vent" type="checkbox" checked>
        <span class="track"></span>
      </label>
    </section>

    <button id="start" class="start">건조 시작</button>
    <button id="cancel" class="start cancel">취소 (공조 끄고 창문 닫기)</button>

    <p id="status" class="status"></p>

    <hr class="sep">

    <h2 class="sub">감시 모드 (Sentry)</h2>

    <section class="row toggle">
      <span class="label">자동 스케줄</span>
      <label class="switch">
        <input id="sentryEnabled" type="checkbox">
        <span class="track"></span>
      </label>
    </section>

    <section class="row">
      <span class="label">켜는 시각</span>
      <input id="sentryOn" type="time" class="time">
    </section>
    <section class="row">
      <span class="label">끄는 시각</span>
      <input id="sentryOff" type="time" class="time">
    </section>

    <button id="sentrySave" class="start">설정 저장</button>
    <p id="sentryStatus" class="status"></p>

    <!-- 감시모드 현재상태/실시간확인 UI는 일단 숨김(기능 코드는 app.js에 유지).
         다시 쓰려면 아래 주석을 해제하면 된다.
    <section class="row">
      <span class="label">현재 상태</span>
      <span id="sentryState" class="value">—</span>
    </section>
    <button id="sentryCheck" class="start">실시간 확인</button>
    -->
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
